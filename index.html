<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table>
    <tr class="t1">
        <td>1-1</td>
        <td colspan="2">1-2</td>
        <td class="yellow">1-3</td>
        <td rowspan="4">1-4</td>
    </tr>
    <tr class="t2">
        <td rowspan="">2-1</td>
        <td colspan="2" rowspan="2" class="red">2-2</td>
        <td class="yellow">2-3</td>
    </tr>
    <tr>
        <td>xx</td>
        <td>yy</td>
    </tr>
    <tr class="t3">
        <td rowspan="1" >3-1</td>
        <td class="black" style="color: #f0f0f0">3-2</td>
        <td>3-3</td>
        <td>3-4</td>
    </tr>
    <tr class="t4">
        <td class="yellow">4-1</td>
        <td>4-2</td>
        <td>4-3</td>
        <td class="blue">4-4</td>
        <td class="red">4-5</td>
    </tr>
    </table>
        // xx - перша допоміжна клітинка
        // yy - друга допоміжна
</body>
</html>
